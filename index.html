<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>デートスポット</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♡</text></svg>">
<style>
:root{
  --bg:#000;--l1:#1c1c1e;--l2:#2c2c2e;--l3:#3a3a3c;
  --sep:rgba(84,84,88,.65);
  --acc:#ff375f;--grn:#30d158;--blu:#0a84ff;
  --ora:#ff9f0a;--pur:#bf5af2;--tel:#5ac8f5;
  --txt:#fff;--t2:#8e8e93;--t3:#48484a;
  --tab:49px;--safe:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.25,.46,.45,.94);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;
  max-width:560px;margin:0 auto;
  min-height:100vh;
  padding-bottom:calc(var(--tab) + var(--safe) + 20px);
}
@media(min-width:900px){
  body{max-width:100%;padding-bottom:0}
  #app{display:flex;min-height:100vh}
  .tabbar{display:none!important}
  /* ── Sidebar ── */
  .dt-nav{
    display:flex!important;flex-direction:column;
    width:220px;min-width:220px;flex-shrink:0;
    position:sticky;top:0;height:100vh;
    border-right:1px solid var(--sep);border-bottom:none;
    padding:0;gap:0;
    background:rgba(0,0,0,.98);
    backdrop-filter:blur(40px) saturate(180%);
    -webkit-backdrop-filter:blur(40px) saturate(180%);
  }
  .dt-nav-logo{
    padding:28px 22px 20px;border-bottom:1px solid var(--sep);
    font-size:17px;font-weight:800;letter-spacing:-.4px;
    display:flex;align-items:center;gap:8px;flex-shrink:0;
  }
  .dntab{
    padding:13px 22px;text-align:left;width:100%;
    border-bottom:none!important;border-left:3px solid transparent;
    font-size:14px;font-weight:500;border-radius:0;letter-spacing:-.1px;
  }
  .dntab.on{color:var(--acc)!important;border-left-color:var(--acc);background:rgba(255,55,95,.07)}
  .dntab:hover:not(.on){background:rgba(255,255,255,.04)}
  .dt-sync-area{
    margin-top:auto;padding:16px 20px;border-top:1px solid var(--sep);
    display:flex;align-items:center;gap:8px;cursor:pointer;
  }
  /* ── Main content ── */
  #dt-main{flex:1;min-width:0;overflow-y:auto;max-height:100vh}
  .pnl{display:none}
  .pnl.on{display:block!important;max-width:900px;padding:0 4px}
  /* ── Card grid ── */
  .card-list{
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:12px;padding:0 16px 24px;
  }
  #archive-list{
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:12px;
  }
  /* ── Suggest / Settings ── */
  .swipe-wrap{max-width:480px;margin:0 auto}
  .suggest-gen-btn{max-width:480px;margin:16px auto 0}
  .suggest-history-section{max-width:860px;margin:0 auto}
  .settings-section{max-width:600px;margin:0 auto}
  .toast{bottom:24px}
}

/* ── TABBAR ── */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;
  height:calc(var(--tab) + var(--safe));
  padding-bottom:var(--safe);
  background:rgba(18,18,20,.85);
  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
  border-top:1px solid var(--sep);
  display:flex;z-index:100;
}
.tbtn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;color:var(--t2);
  font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;
  transition:color .15s var(--ease);letter-spacing:.3px;
}
.tbtn .ic{font-size:22px;line-height:1;transition:transform .2s var(--spring)}
.tbtn.on{color:var(--acc)}
.tbtn.on .ic{transform:scale(1.1)}

/* ── DESKTOP NAV ── */
.dt-nav{
  display:none;
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
  border-bottom:1px solid var(--sep);
  padding:0 20px;gap:0;
}
.dntab{
  padding:16px 20px;font-size:14px;font-weight:600;
  color:var(--t2);cursor:pointer;border:none;background:none;
  font-family:inherit;border-bottom:2px solid transparent;
  transition:all .2s var(--ease);letter-spacing:-.2px;
}
.dntab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ── PANEL ── */
.pnl{display:none}.pnl.on{display:block}

/* ── NAV HEADER ── */
.nav-hdr{
  padding:16px 20px 0;
  display:flex;align-items:flex-end;justify-content:space-between;
  position:sticky;top:0;z-index:40;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding-bottom:12px;
  border-bottom:1px solid var(--sep);
}
.nav-title{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1}
.nav-action{
  background:var(--acc);color:#fff;
  border:none;border-radius:50%;
  width:32px;height:32px;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-weight:300;line-height:1;
  transition:transform .15s var(--spring),opacity .15s;
  flex-shrink:0;
}
.nav-action:active{transform:scale(.92)}

/* ── SYNC DOT ── */
.sync-wrap{display:flex;align-items:center;gap:6px;cursor:pointer}
.dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s}
.dot.ok{background:var(--grn)}.dot.busy{background:var(--ora);animation:pulse .8s infinite}.dot.err{background:var(--acc)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.sync-txt{font-size:11px;color:var(--t2);font-variant-numeric:tabular-nums;letter-spacing:.2px}

/* ── FILTER BAR ── */
.filter-bar{
  display:flex;gap:8px;overflow-x:auto;
  padding:12px 20px;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{
  background:var(--l1);border:none;border-radius:20px;
  padding:7px 16px;font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;color:var(--t2);
  white-space:nowrap;flex-shrink:0;
  transition:all .18s var(--ease);letter-spacing:-.1px;
}
.fchip.on{background:var(--acc);color:#fff}
.fchip:active{transform:scale(.95)}

/* ── PLACE CARD ── */
.card-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px}
.place-card{
  background:var(--l1);border-radius:16px;overflow:hidden;
  display:flex;flex-direction:column;
  transition:transform .2s var(--ease);
  cursor:default;
}
.place-card:active{transform:scale(.99)}
.place-card-inner{padding:16px;flex:1}
.genre-line{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.genre-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.genre-lbl{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.place-name{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;line-height:1.3}
.place-meta{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.place-meta-row{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:5px}
.place-memo{font-size:14px;color:var(--t2);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.place-card-footer{
  border-top:1px solid var(--sep);
  display:flex;
}
.card-btn{
  flex:1;padding:12px;font-size:13px;font-weight:600;
  font-family:inherit;border:none;background:none;
  cursor:pointer;color:var(--t2);
  transition:background .15s,color .15s;letter-spacing:-.1px;
}
.card-btn:active{background:var(--l2)}
.card-btn.primary{color:var(--grn)}
.card-btn.danger{color:var(--acc)}
.card-btn-sep{width:1px;background:var(--sep);flex-shrink:0}

/* ── ARCHIVE CARD ── */
.archive-card{
  background:var(--l1);border-radius:16px;padding:16px;
  display:flex;flex-direction:column;gap:8px;
}
.archive-card-top{display:flex;align-items:flex-start;gap:12px}
.archive-stars{color:#f5c518;font-size:14px;letter-spacing:1px;flex-shrink:0}
.archive-name{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1.3}
.archive-date{font-size:12px;color:var(--t2);margin-top:2px;font-variant-numeric:tabular-nums}
.archive-impression{
  font-size:14px;color:rgba(255,255,255,.8);line-height:1.7;
  border-left:2px solid var(--acc);padding-left:12px;
  font-style:italic;
}
.archive-link{font-size:12px;color:var(--blu)}

/* ── SORT ROW ── */
.sort-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px 12px;
}
.sort-sel{
  background:none;border:none;color:var(--t2);
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  padding:0;appearance:none;-webkit-appearance:none;
  display:flex;align-items:center;gap:4px;
}
.sort-sel::after{content:'▾';font-size:10px;color:var(--t2)}

/* ── SWIPE ── */
.swipe-wrap{padding:20px 16px 0;width:100%;box-sizing:border-box}
.swipe-section-title{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:16px}
.swipe-stack{
  position:relative;height:420px;
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
}
.swipe-card{
  position:absolute;
  width:calc(100% - 0px);max-width:360px;height:400px;
  border-radius:24px;overflow:hidden;
  cursor:grab;user-select:none;touch-action:pan-y;
  will-change:transform;
}
.swipe-card:active{cursor:grabbing}
.swipe-card-bg{
  position:absolute;inset:0;
}
.swipe-card-content{
  position:absolute;bottom:0;left:0;right:0;padding:24px;
  background:linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.5) 60%, transparent 100%);
}
.swipe-type-badge{
  display:inline-block;padding:4px 10px;border-radius:8px;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:10px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
  color:#fff;
}
.swipe-genre{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:4px;letter-spacing:.3px}
.swipe-name{font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.25;margin-bottom:6px}
.swipe-desc{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:10px}
.swipe-price{font-size:13px;color:rgba(255,255,255,.6);font-variant-numeric:tabular-nums}
.swipe-url{display:block;margin-top:4px;font-size:12px;color:var(--tel)}
.swipe-label{
  position:absolute;top:20px;
  font-size:18px;font-weight:800;letter-spacing:.5px;
  opacity:0;transition:opacity .05s;
  pointer-events:none;padding:6px 12px;border-radius:10px;backdrop-filter:blur(8px);
}
.swipe-label.yes{right:16px;color:var(--grn);border:2px solid var(--grn);background:rgba(48,209,88,.15)}
.swipe-label.no{left:16px;color:var(--acc);border:2px solid var(--acc);background:rgba(255,55,95,.15)}
@keyframes flyRight{to{transform:translateX(150%) rotate(18deg);opacity:0}}
@keyframes flyLeft{to{transform:translateX(-150%) rotate(-18deg);opacity:0}}
.fly-yes{animation:flyRight .38s var(--ease) forwards;pointer-events:none}
.fly-no{animation:flyLeft .38s var(--ease) forwards;pointer-events:none}
.swipe-actions{
  display:none;justify-content:center;align-items:center;gap:28px;
  margin-top:20px;
}
.action-btn{
  width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;
  font-size:28px;display:flex;align-items:center;justify-content:center;
  transition:transform .15s var(--spring),opacity .15s;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.action-btn:active{transform:scale(.88)}
.action-no{background:var(--l1)}
.action-yes{background:var(--grn)}
.suggest-gen-btn{
  display:block;width:calc(100% - 32px);margin:16px auto 0;
  background:var(--l1);color:var(--txt);
  border:none;border-radius:16px;padding:16px;
  font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;text-align:center;letter-spacing:-.2px;
  transition:background .15s,transform .15s var(--spring);
}
.suggest-gen-btn:active{background:var(--l2);transform:scale(.98)}
.suggest-gen-btn:disabled{opacity:.5;cursor:not-allowed}
.suggest-ai-status{
  margin:12px auto 0;width:calc(100% - 32px);padding:14px 16px;
  background:var(--l1);border-radius:12px;
  font-size:13px;color:var(--t2);line-height:1.7;
  border-left:2px solid var(--acc);display:none;
}
.suggest-history-section{padding:24px 16px 0}
.suggest-history-title{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:12px}

/* ── EMPTY STATE ── */
.empty-state{
  text-align:center;padding:56px 20px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.empty-icon{font-size:48px;line-height:1;margin-bottom:4px;opacity:.4}
.empty-title{font-size:17px;font-weight:600;letter-spacing:-.3px;color:var(--t2)}
.empty-sub{font-size:14px;color:var(--t3);line-height:1.5;max-width:220px}

/* ── SETTINGS ── */
.settings-section{padding:24px 20px 0}
.settings-title{font-size:13px;font-weight:600;color:var(--t2);letter-spacing:.3px;text-transform:uppercase;margin-bottom:8px;padding:0 4px}
.settings-group{background:var(--l1);border-radius:16px;overflow:hidden}
.settings-row{
  display:flex;align-items:center;padding:14px 16px;
  border-bottom:1px solid var(--sep);gap:12px;
}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:15px;font-weight:500;flex:1;letter-spacing:-.2px}
.settings-row-value{font-size:15px;color:var(--t2)}
.settings-input{
  background:none;border:none;color:var(--txt);font-family:inherit;
  font-size:15px;text-align:right;outline:none;width:100%;
  padding:0;letter-spacing:-.1px;
}
.settings-input::placeholder{color:var(--t3)}
.settings-btn{
  padding:14px 16px;font-size:15px;font-weight:500;
  text-align:left;cursor:pointer;width:100%;
  background:none;border:none;font-family:inherit;color:var(--acc);
  border-bottom:1px solid var(--sep);letter-spacing:-.2px;
  transition:background .15s;
}
.settings-btn:last-child{border-bottom:none}
.settings-btn:active{background:var(--l2)}
.settings-btn.danger{color:var(--acc)}
.pref-item{
  display:flex;align-items:center;padding:12px 16px;
  border-bottom:1px solid var(--sep);gap:10px;
}
.pref-item:last-child{border-bottom:none}
.pref-genre{font-size:15px;font-weight:500;flex:1;letter-spacing:-.2px}
.pref-counts{font-size:13px;color:var(--t2);font-variant-numeric:tabular-nums}

/* ── MODAL / SHEET ── */
.sheet-ov{
  position:fixed;inset:0;z-index:9000;
  display:flex;align-items:flex-end;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}
@media(min-width:600px){.sheet-ov{align-items:center;justify-content:center}}
.sheet{
  background:var(--l1);
  border-radius:20px 20px 0 0;
  width:100%;max-width:540px;max-height:92vh;
  overflow-y:auto;padding:0 0 calc(var(--safe) + 16px);
  animation:slideUp .32s var(--ease);
}
@media(min-width:600px){.sheet{border-radius:20px;max-height:80vh;padding-bottom:0}}
@keyframes slideUp{from{transform:translateY(100%);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--l3);margin:12px auto 0;
}
.sheet-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sheet-title{font-size:20px;font-weight:700;letter-spacing:-.4px}
.sheet-close{
  background:var(--l2);border:none;border-radius:50%;
  width:30px;height:30px;font-size:16px;color:var(--t2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;font-family:inherit;font-weight:300;
}
.sheet-close:active{background:var(--l3)}
.sheet-body{padding:16px 20px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;display:block}
.form-input{
  background:var(--l2);border:none;border-radius:12px;
  color:var(--txt);font-family:inherit;font-size:15px;
  padding:13px 14px;width:100%;outline:none;
  transition:box-shadow .15s;letter-spacing:-.1px;
}
.form-input:focus{box-shadow:0 0 0 2px var(--acc)}
.form-input::placeholder{color:var(--t3)}
textarea.form-input{resize:none;line-height:1.6}
select.form-input{appearance:none;-webkit-appearance:none;cursor:pointer}
select.form-input option{background:var(--l2)}
.form-row{display:flex;gap:10px}
.form-row>.form-group{flex:1;margin-bottom:0}
.ai-btn{
  background:var(--l2);border:none;border-radius:10px;
  color:var(--tel);font-family:inherit;font-size:13px;font-weight:700;
  padding:10px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:background .15s,transform .15s var(--spring);letter-spacing:-.1px;
  align-self:flex-end;height:44px;
}
.ai-btn:active{background:var(--l3);transform:scale(.96)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-status{
  background:var(--l2);border-radius:10px;padding:10px 12px;
  font-size:13px;color:var(--t2);margin-bottom:12px;
  border-left:2px solid var(--acc);line-height:1.5;display:none;
}
.sheet-actions{display:flex;gap:10px;padding:0 20px;padding-bottom:4px}
.sheet-btn{
  flex:1;padding:14px;border:none;border-radius:14px;
  font-family:inherit;font-size:16px;font-weight:700;
  cursor:pointer;letter-spacing:-.3px;
  transition:transform .15s var(--spring),opacity .15s;
}
.sheet-btn:active{transform:scale(.97)}
.sheet-btn.primary{background:var(--acc);color:#fff}
.sheet-btn.secondary{background:var(--l2);color:var(--t2)}

/* ── STAR RATING ── */
.star-wrap{display:flex;gap:8px;padding:4px 0}
.star{font-size:30px;cursor:pointer;color:var(--l3);transition:color .1s,transform .1s var(--spring);line-height:1}
.star.on{color:#f5c518}
.star:active{transform:scale(.85)}

/* ── DEBUG ── */
#dbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;padding:16px;gap:10px}
#dbg.on{display:flex}
#dbg-log{flex:1;overflow-y:auto;font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.9;color:#ccc;white-space:pre-wrap;background:var(--l2);border-radius:10px;padding:12px}
.derr{color:var(--acc)}.dok{color:var(--grn)}.dinf{color:var(--ora)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--tab) + var(--safe) + 16px);
  left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(44,44,46,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;font-weight:600;padding:10px 20px;
  border-radius:30px;font-size:14px;letter-spacing:-.2px;
  opacity:0;transition:all .25s var(--ease);
  pointer-events:none;z-index:9998;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:900px){.toast{bottom:24px}}

/* ── API KEY SCREEN ── */
.setup-screen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 24px;
  gap:32px;
}
.setup-icon{font-size:64px;line-height:1;text-align:center}
.setup-title{font-size:28px;font-weight:800;letter-spacing:-.6px;text-align:center}
.setup-sub{font-size:15px;color:var(--t2);text-align:center;line-height:1.6;max-width:300px}
.setup-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.setup-link{font-size:13px;color:var(--blu);text-align:center;text-decoration:none;cursor:pointer}
</style>
</head>
<body>

<!-- Setup / API Key -->
<div id="setup-screen" style="display:none">
  <div class="setup-icon">♡</div>
  <div>
    <div class="setup-title">デートスポット</div>
    <div class="setup-sub" style="margin-top:8px">Claude APIキーを入力して始めましょう</div>
  </div>
  <div class="setup-form">
    <input class="form-input" id="key-in" type="password" placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="sheet-btn primary" onclick="saveKey()">はじめる</button>
    <a class="setup-link" href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">APIキーを取得する →</a>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none">

  <!-- Desktop nav / Sidebar -->
  <div class="dt-nav">
    <div style="height:16px"></div>
    <button class="dntab on" onclick="tab('want',this)">♡　行きたい</button>
    <button class="dntab" onclick="tab('archive',this)">◎　アーカイブ</button>
    <button class="dntab" onclick="tab('suggest',this)">✦　提案</button>
    <button class="dntab" onclick="tab('settings',this)">⚙　設定</button>
    <div class="dt-sync-area" onclick="toggleDbg()">
      <div class="dot" id="dot"></div>
      <span class="sync-txt" id="sync-txt" style="font-size:12px;color:var(--t2)">--</span>
    </div>
  </div>

  <!-- Main content wrapper (desktop) -->
  <div id="dt-main">

  <!-- Panel: 行きたい -->
  <div class="pnl on" id="pnl-want">
    <div class="nav-hdr">
        <div>
          <div class="nav-title">行きたい</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="sync-wrap" onclick="toggleDbg()" id="want-sync">
            <div class="dot" id="dot-mobile"></div>
          </div>
          <button class="nav-action" onclick="openAddModal()" aria-label="追加">+</button>
        </div>
      </div>
      <div class="filter-bar" id="want-filters">
        <button class="fchip on" onclick="filterWant('all',this)">すべて</button>
      </div>
      <div class="sort-row">
        <div style="position:relative;display:inline-flex;align-items:center;gap:4px">
          <select id="want-sort" onchange="renderWant()" class="sort-sel" style="position:absolute;inset:0;opacity:0;cursor:pointer;font-size:16px">
            <option value="date-desc">追加日（新→古）</option>
            <option value="date-asc">追加日（古→新）</option>
            <option value="name-asc">名前順</option>
            <option value="price-asc">価格（安→高）</option>
          </select>
          <span style="font-size:13px;font-weight:600;color:var(--t2)" id="want-sort-lbl">追加日（新→古）</span>
          <span style="font-size:11px;color:var(--t3)">▾</span>
        </div>
        <span style="font-size:13px;color:var(--t3)" id="want-count"></span>
      </div>
      <div class="card-list" id="want-grid"></div>
      <div class="empty-state" id="want-empty" style="display:none">
        <div class="empty-icon">♡</div>
        <div class="empty-title">まだ登録なし</div>
        <div class="empty-sub">行きたい場所を追加して、二人のリストを作ろう</div>
      </div>
  </div>

  <!-- Panel: アーカイブ -->
  <div class="pnl" id="pnl-archive">
    <div class="nav-hdr">
      <div class="nav-title">アーカイブ</div>
      <div style="position:relative;display:inline-flex;align-items:center;gap:4px">
        <select id="archive-sort" onchange="renderArchive()" style="position:absolute;inset:0;opacity:0;cursor:pointer;font-size:16px">
          <option value="date-desc">訪問日（新→古）</option>
          <option value="date-asc">訪問日（古→新）</option>
          <option value="rating-desc">評価（高→低）</option>
        </select>
        <span style="font-size:13px;font-weight:600;color:var(--t2)" id="archive-sort-lbl">訪問日（新→古）</span>
        <span style="font-size:11px;color:var(--t3)">▾</span>
      </div>
    </div>
    <div class="filter-bar" id="archive-filters">
      <button class="fchip on" onclick="filterArchive('all',this)">すべて</button>
    </div>
    <div class="card-list" id="archive-list"></div>
    <div class="empty-state" id="archive-empty" style="display:none">
      <div class="empty-icon">◎</div>
      <div class="empty-title">まだ訪問記録なし</div>
      <div class="empty-sub">行きたいリストから「行った」を押すと記録できるよ</div>
    </div>
  </div>

  <!-- Panel: 提案 -->
  <div class="pnl" id="pnl-suggest">
    <div class="nav-hdr">
      <div class="nav-title">提案</div>
    </div>
    <div class="swipe-wrap">
      <div class="swipe-section-title">今日のおすすめ</div>
      <div class="swipe-stack" id="swipe-stack">
        <div class="empty-state" id="suggest-empty">
          <div class="empty-icon">✦</div>
          <div class="empty-title">提案を生成しよう</div>
          <div class="empty-sub">AIが二人に合うスポットをセレクトします</div>
        </div>
      </div>
      <div class="swipe-actions" id="swipe-btns">
        <button class="action-btn action-no" onclick="swipeNo()" title="パス">✕</button>
        <button class="action-btn action-yes" onclick="swipeYes()" title="行きたい！">♡</button>
      </div>
    </div>
    <button class="suggest-gen-btn" id="btn-gen-suggest" onclick="generateSuggestions()">✦ 新しい提案を生成</button>
    <div class="suggest-ai-status" id="suggest-ai-status">AIが考え中...</div>
    <div class="suggest-history-section">
      <div class="suggest-history-title">提案履歴</div>
      <div id="suggest-history"></div>
    </div>
  </div>

  <!-- Panel: 設定 -->
  <div class="pnl" id="pnl-settings">
    <div class="nav-hdr"><div class="nav-title">設定</div></div>

    <div class="settings-section">
      <div class="settings-title">接続設定</div>
      <div class="settings-group">
        <div class="settings-row">
          <span class="settings-row-label">Claude API Key</span>
          <input class="settings-input" id="s-key" type="password" placeholder="sk-ant-..." autocomplete="off" onblur="saveKeyFromSettings(this.value)">
        </div>
        <div class="settings-row">
          <span class="settings-row-label">GAS URL</span>
          <input class="settings-input" id="s-gas" type="text" placeholder="https://script.google.com/..." onblur="saveGasUrl(this.value)">
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">ジャンル学習データ</div>
      <div class="settings-group" id="pref-list">
        <div class="settings-row"><span class="settings-row-label" style="color:var(--t3)">まだデータなし</span></div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">操作</div>
      <div class="settings-group">
        <button class="settings-btn" onclick="init()">データを再読み込み</button>
        <button class="settings-btn" onclick="resetPreferences()">学習データをリセット</button>
      </div>
    </div>

    <div style="height:32px"></div>
  </div>

  </div><!-- /dt-main -->
</div>

<!-- Modals -->

<!-- Add / Edit Sheet -->
<div id="place-sheet" class="sheet-ov" style="display:none" onclick="if(event.target===this)closePlaceSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="place-sheet-title">場所を追加</div>
      <button class="sheet-close" onclick="closePlaceSheet()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="form-group">
        <label class="form-label">名前</label>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <input class="form-input" id="pm-name" placeholder="例：チームラボ プラネッツ" style="flex:1">
          <button class="ai-btn" id="btn-extract" onclick="autoExtract()">AI取得</button>
        </div>
      </div>
      <div class="ai-status" id="extract-status"></div>
      <div class="form-group">
        <label class="form-label">URL</label>
        <input class="form-input" id="pm-url" type="url" placeholder="https://...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">エリア</label>
          <input class="form-input" id="pm-location" placeholder="渋谷、豊洲 etc">
        </div>
        <div class="form-group">
          <label class="form-label">価格帯</label>
          <input class="form-input" id="pm-price" placeholder="〜¥3,000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">ジャンル</label>
        <select class="form-input" id="pm-genre">
          <option value="">選択してください</option>
          <option>レストラン</option><option>カフェ</option>
          <option>美術館</option><option>博物館</option>
          <option>公園</option><option>ショッピング</option>
          <option>イベント</option><option>季節限定</option>
          <option>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">メモ</label>
        <textarea class="form-input" id="pm-memo" rows="3" placeholder="気になったポイント、行きたい理由など..."></textarea>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn secondary" onclick="closePlaceSheet()">キャンセル</button>
      <button class="sheet-btn primary" onclick="savePlace()">保存</button>
    </div>
    <div style="height:8px"></div>
  </div>
</div>

<!-- Visit Sheet -->
<div id="visit-sheet" class="sheet-ov" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">訪問を記録</div>
      <button class="sheet-close" onclick="document.getElementById('visit-sheet').style.display='none'">✕</button>
    </div>
    <div class="sheet-body">
      <div style="font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:20px;color:var(--t2)" id="vm-name"></div>
      <div class="form-group">
        <label class="form-label">訪問日</label>
        <input class="form-input" id="vm-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">評価</label>
        <div class="star-wrap" id="vm-stars">
          <span class="star" data-v="1" onclick="setRating(1)">★</span>
          <span class="star" data-v="2" onclick="setRating(2)">★</span>
          <span class="star" data-v="3" onclick="setRating(3)">★</span>
          <span class="star" data-v="4" onclick="setRating(4)">★</span>
          <span class="star" data-v="5" onclick="setRating(5)">★</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">感想</label>
        <textarea class="form-input" id="vm-impression" rows="4" placeholder="雰囲気、料理、また来たいかどうか..."></textarea>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="sheet-btn secondary" onclick="document.getElementById('visit-sheet').style.display='none'">キャンセル</button>
      <button class="sheet-btn primary" onclick="submitVisit()">アーカイブに移動</button>
    </div>
    <div style="height:8px"></div>
  </div>
</div>

<!-- Debug -->
<div id="dbg">
  <div style="display:flex;gap:8px;align-items:center">
    <span style="font-size:13px;font-weight:700;color:var(--t2);font-family:'SF Mono',monospace">DEBUG</span>
    <button class="sheet-btn secondary" onclick="toggleDbg()" style="flex:0;padding:6px 14px;font-size:13px;border-radius:8px;font-weight:600">閉じる</button>
    <button class="sheet-btn secondary" onclick="dbgLines=[];document.getElementById('dbg-log').innerHTML=''" style="flex:0;padding:6px 14px;font-size:13px;border-radius:8px;font-weight:600">クリア</button>
  </div>
  <div id="dbg-log"></div>
</div>

<!-- Tab bar (mobile) -->
<div class="tabbar" id="tabbar">
  <button class="tbtn on" onclick="tab('want',this)"><span class="ic">♡</span>行きたい</button>
  <button class="tbtn" onclick="tab('archive',this)"><span class="ic">◎</span>アーカイブ</button>
  <button class="tbtn" onclick="tab('suggest',this)"><span class="ic">✦</span>提案</button>
  <button class="tbtn" onclick="tab('settings',this)"><span class="ic">⚙</span>設定</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Constants ──
const CLAUDE_API = 'https://api.anthropic.com/v1/messages';
const _GAS_URL = 'https://script.google.com/macros/s/AKfycbyjXAXZ3NMtoBnIFYVaZrs8N8U1izheQ9DMt4ouR1INJH-MCXRY5ihRuMbutDVq2TJW/exec';
let GAS = localStorage.getItem('gas_url') || _GAS_URL;

// ── Data ──
let places = [], archived = [], suggestions = [], preferences = {}, config = {};

// ── UI state ──
let cbCtr = 0, dbgLines = [], useFetch = true;
let wantFilter = 'all', archiveFilter = 'all';
let swipeIdx = 0, pendingSuggestions = [];
let editingId = null, visitingId = null, currentRating = 0;

// ── Genre system ──
const GENRE_COLOR = {
  'レストラン': '#ff9f0a', 'カフェ': '#c07840', '美術館': '#bf5af2',
  '博物館': '#bf5af2', '公園': '#30d158', 'ショッピング': '#0a84ff',
  'イベント': '#ff375f', '季節限定': '#5ac8f5', 'その他': '#636366'
};
const GENRE_GRAD = {
  'レストラン': 'linear-gradient(145deg,#1a0a02,#3d1a05)',
  'カフェ': 'linear-gradient(145deg,#150c02,#2d1a08)',
  '美術館': 'linear-gradient(145deg,#0d0019,#280050)',
  '博物館': 'linear-gradient(145deg,#0a0019,#220045)',
  '公園': 'linear-gradient(145deg,#001800,#003800)',
  'ショッピング': 'linear-gradient(145deg,#00051a,#001050)',
  'イベント': 'linear-gradient(145deg,#1a0008,#400018)',
  '季節限定': 'linear-gradient(145deg,#001a20,#004050)',
  'その他': 'linear-gradient(145deg,#0a0a0a,#1c1c1e)'
};
function genreColor(g) { return GENRE_COLOR[g] || '#636366'; }
function genreGrad(g) { return GENRE_GRAD[g] || GENRE_GRAD['その他']; }

// ── Helpers ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function normDate(s) { s=String(s||''); if(!s)return''; if(s.includes('T')){const d=new Date(s);if(!isNaN(d))return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}return s.slice(0,10); }
function setSt(s,t) {
  ['dot','dot-mobile'].forEach(id=>{const el=document.getElementById(id);if(el)el.className='dot '+s;});
  const el=document.getElementById('sync-txt');if(el)el.textContent=t;
}
function toast(msg) { const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2600); }
function log(msg,type='') { const ts=new Date().toTimeString().slice(0,8);const cls=type?` class="d${type}"`:' class="dinf"';dbgLines.push(`<span${cls}>[${ts}] ${String(msg).replace(/</g,'&lt;')}</span>`);if(dbgLines.length>300)dbgLines.shift();const el=document.getElementById('dbg-log');el.innerHTML=dbgLines.join('\n');el.scrollTop=el.scrollHeight; }
function toggleDbg() { document.getElementById('dbg').classList.toggle('on'); }
function priceSortVal(s) { const m=String(s||'').replace(/[,，￥¥]/g,'').match(/\d+/);return m?parseInt(m[0]):99999; }

// ── Auth ──
function showSetup() {
  document.getElementById('setup-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function hideSetup() {
  document.getElementById('setup-screen').style.display='none';
  const app = document.getElementById('app');
  app.style.display = window.innerWidth >= 900 ? 'flex' : 'block';
}
function saveKey() {
  const k = document.getElementById('key-in').value.trim();
  if (!k || !k.startsWith('sk-ant-')) return toast('sk-ant- で始まるキーを入力してください');
  localStorage.setItem('claude_api_key', k);
  hideSetup();
  init();
}
function saveKeyFromSettings(v) {
  const k = v.trim();
  if (!k) return;
  localStorage.setItem('claude_api_key', k);
  toast('APIキーを更新しました');
}
function saveGasUrl(v) {
  const url = v.trim();
  if (!url) return;
  localStorage.setItem('gas_url', url);
  GAS = url;
  toast('GAS URLを更新しました。再読み込みします...');
  setTimeout(init, 800);
}

// ── GAS ──
async function gasCall(params) {
  if (!GAS) throw new Error('GAS URLが未設定です。設定タブで入力してください。');
  const qs = Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  if (useFetch) {
    try {
      log(`fetch→ ${params.action}[${params.sheet||''}]`);
      const r = await fetch(GAS+'?'+qs, {redirect:'follow'});
      const text = await r.text();
      log('raw: '+text.slice(0,80));
      const json = JSON.parse(text);
      if (json.ok !== undefined) { log('OK','ok'); return json; }
    } catch(e) { log(`fetch失敗(${e.message})→JSONP`,'err'); useFetch = false; }
  }
  return jsonpCall(params);
}
function jsonpCall(params) {
  return new Promise((resolve,reject)=>{
    const name='__cb'+(cbCtr++);let done=false;
    const timer=setTimeout(()=>{if(done)return;done=true;cleanup();reject(new Error('timeout'))},15000);
    window[name]=(d)=>{if(done)return;done=true;clearTimeout(timer);cleanup();resolve(d)};
    const cleanup=()=>{delete window[name];const s=document.getElementById('_s'+name);if(s)s.remove()};
    const qs=Object.entries({...params,callback:name}).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const sc=document.createElement('script');sc.id='_s'+name;sc.src=GAS+'?'+qs;
    sc.onerror=()=>{if(done)return;done=true;clearTimeout(timer);cleanup();reject(new Error('script error'))};
    log(`jsonp→ ${params.action}[${params.sheet||''}]`);document.head.appendChild(sc);
  });
}
async function gasRead(sheet){const r=await gasCall({action:'read',sheet});if(!r.ok)throw new Error(r.error||'read failed');log(`read ${sheet} (${(r.data||[]).length}行)`,'ok');return r.data||[]}
async function gasWrite(sheet,rows){const r=await gasCall({action:'write',sheet,rows:JSON.stringify(rows)});if(!r.ok)throw new Error(r.error||'write failed');log(`write ${sheet}`,'ok')}
async function gasAppend(sheet,rows){const r=await gasCall({action:'append',sheet,rows:JSON.stringify(rows)});if(!r.ok)throw new Error(r.error||'append failed');log(`append ${sheet}`,'ok')}
function parseRows(rows){if(!rows||!rows.length)return[];const f=rows[0];const isH=f.length>0&&typeof f[0]==='string'&&isNaN(f[0])&&f[0]!=='';return isH?rows.slice(1):rows}

// ── Claude ──
async function askClaude(prompt, maxTok=1400) {
  const k = localStorage.getItem('claude_api_key') || config['claude_api_key'] || '';
  if (!k) { showSetup(); throw new Error('APIキーが未設定です'); }
  log('Claude→ '+prompt.slice(0,50)+'...');
  const r = await fetch(CLAUDE_API, {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,messages:[{role:'user',content:prompt}]})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  log('Claude OK','ok');
  return d.content?.[0]?.text || '';
}

// ── Init ──
async function init() {
  if (!GAS) {
    setSt('err', 'GAS URL未設定');
    tab('settings', null);
    document.querySelectorAll('.tbtn').forEach((b,i)=>{ b.classList.toggle('on', i===3); });
    toast('設定タブでGAS URLを入力してください');
    return;
  }
  useFetch = true;
  setSt('busy', '読み込み中...');
  log('=== init ===');
  try {
    const [pD,aD,sD,prD,cD] = await Promise.all([
      gasRead('places'), gasRead('archived'), gasRead('suggestions'),
      gasRead('preferences'), gasRead('config')
    ]);
    places = parseRows(pD).map(r=>({
      id:String(r[0]),name:String(r[1]||''),url:String(r[2]||''),
      memo:String(r[3]||''),genre:String(r[4]||''),
      location:String(r[5]||''),price:String(r[6]||''),
      addedDate:normDate(r[7]),status:String(r[8]||'want')
    })).filter(r=>r.name);
    archived = parseRows(aD).map(r=>({
      id:String(r[0]),name:String(r[1]||''),url:String(r[2]||''),
      memo:String(r[3]||''),genre:String(r[4]||''),
      location:String(r[5]||''),price:String(r[6]||''),
      visitDate:normDate(r[7]),impression:String(r[8]||''),rating:parseInt(r[9])||0
    })).filter(r=>r.name);
    suggestions = parseRows(sD).map(r=>({
      id:String(r[0]),name:String(r[1]||''),url:String(r[2]||''),
      genre:String(r[3]||''),description:String(r[4]||''),
      price:String(r[5]||''),suggestedDate:normDate(r[6]),
      response:String(r[7]||'pending'),suggestedType:String(r[8]||'')
    })).filter(r=>r.name);
    preferences = {};
    parseRows(prD).forEach(r=>{ if(r[0]) preferences[String(r[0])]={liked:parseInt(r[1])||0,disliked:parseInt(r[2])||0}; });
    config = Object.fromEntries(parseRows(cD).map(r=>[String(r[0]),String(r[1]||'')]));
    if (config['claude_api_key'] && !localStorage.getItem('claude_api_key')) {
      localStorage.setItem('claude_api_key', config['claude_api_key']);
    }
    log(`場所:${places.length} アーカイブ:${archived.length} 提案:${suggestions.length}`,'ok');
    renderAll();
    setSt('ok', '同期済み');
  } catch(e) {
    log('init ERROR: '+e.message,'err');
    setSt('err', 'エラー（タップで詳細）');
    toast('接続失敗 — ステータスをタップして確認');
  }
}
function renderAll() {
  renderFilters();renderWant();renderArchive();
  pendingSuggestions = suggestions.filter(s=>s.response==='pending');
  swipeIdx = 0;renderSwipeDeck();renderSuggestHistory();renderPreferences();
  document.getElementById('s-key').value = localStorage.getItem('claude_api_key') || '';
  document.getElementById('s-gas').value = GAS;
}

async function savePlace() {
  const name = document.getElementById('pm-name').value.trim();

  const data = {
    name, url: document.getElementById('pm-url').value.trim(),

  };

async function generateSuggestions() {
  const btn = document.getElementById('btn-gen-suggest');
  const status = document.getElementById('suggest-ai-status');
  btn.disabled = true;
  status.style.display = 'block';
  status.textContent = '✦ AIが考え中です...';
  const prefStr = Object.entries(preferences).map(([g,v])=>`${g}:好き${v.liked}/嫌い${v.disliked}`).join(', ') || 'データなし';
  const visited = archived.slice(0,15).map(p=>p.name).join('、') || 'なし';
  const want = places.slice(0,10).map(p=>p.name).join('、') || 'なし';
  const today = todayStr(); const month = today.slice(5,7);
  try {
    const text = await askClaude(
      `あなたはカップルのデートプランナーです。今日（${today}）を考慮し新鮮なデートスポット5件を提案してください。\n\nユーザー好み: ${prefStr}\n行った場所: ${visited}\n行きたいリスト: ${want}\n\n提案タイプ各1〜2件: opening(新オープン), exhibition(展示中), seasonal(${month}月旬), event(期間限定)\n\nJSONのみ。前置き不要。リストや行った場所は除外。\n{"suggestions":[{"name":"場所名","url":"公式URL or null","genre":"レストラン/カフェ/美術館/博物館/公園/ショッピング/イベント/季節限定/その他","description":"カップル向け60文字の説明","price":"価格帯 or null","suggestedType":"opening/exhibition/seasonal/event"}]}`,
      2000
    );
    const json = JSON.parse(text.replace(/```json|```/g,'').trim());
    const newS = (json.suggestions||[]).map(s=>({
      id:(Date.now()+Math.random()).toString().replace('.',''),
      name:s.name, url:s.url&&s.url!=='null'?s.url:'',
      genre:s.genre||'その他', description:s.description||'',
      price:s.price&&s.price!=='null'?s.price:'',
      suggestedDate:today, response:'pending', suggestedType:s.suggestedType||'event'
    }));
    if (newS.length) {
      if (!suggestions.length) {
        await gasWrite('suggestions',[['id','name','url','genre','description','price','suggestedDate','response','suggestedType'],...newS.map(s=>[s.id,s.name,s.url,s.genre,s.description,s.price,s.suggestedDate,s.response,s.suggestedType])]);
      } else {
        await gasAppend('suggestions',newS.map(s=>[s.id,s.name,s.url,s.genre,s.description,s.price,s.suggestedDate,s.response,s.suggestedType]));
      }
      suggestions.push(...newS);
    }
    pendingSuggestions = suggestions.filter(s=>s.response==='pending');
    swipeIdx = 0;
    renderSwipeDeck(); renderSuggestHistory();
    status.style.display = 'none';
    toast(`${newS.length}件の提案を生成しました`);
  } catch(e) {
    status.textContent = 'エラー: '+e.message;
    log('generateSuggestions: '+e.message,'err');
  }

function renderSwipeDeck() {
  const stack = document.getElementById('swipe-stack');
  const btns = document.getElementById('swipe-btns');
  pendingSuggestions = suggestions.filter(s=>s.response==='pending');
  if (!pendingSuggestions.length) {
    stack.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-title">提案を生成しよう</div><div class="empty-sub">AIが二人に合うスポットをセレクトします</div></div>`;
    btns.style.display = 'none'; return;
  }
  const cur = pendingSuggestions.slice(swipeIdx, swipeIdx+3);
  if (!cur.length) {
    stack.innerHTML = `<div class="empty-state"><div class="empty-icon" style="opacity:1">🎉</div><div class="empty-title">すべて確認済み！</div><div class="empty-sub">新しい提案を生成してください</div></div>`;
    btns.style.display = 'none'; return;
  }
  btns.style.display = 'flex';
  const typeLabel = {'opening':'🆕 新オープン','exhibition':'🎨 展示中','seasonal':'🌸 季節限定','event':'⚡ イベント'};
  stack.innerHTML = cur.map((s,i)=>`
    <div class="swipe-card" id="sc-${s.id}" style="z-index:${10-i};transform:scale(${1-i*.03}) translateY(${i*12}px)">
      <div class="swipe-card-bg" style="background:${genreGrad(s.genre)}"></div>
      <div class="swipe-card-content">
        <div class="swipe-label yes" id="sl-yes-${s.id}">行きたい ♡</div>
        <div class="swipe-label no" id="sl-no-${s.id}">パス ✕</div>
        ${typeLabel[s.suggestedType]?`<div class="swipe-type-badge">${typeLabel[s.suggestedType]}</div>`:''}
        <div class="swipe-genre">${esc(s.genre)}</div>
        <div class="swipe-name">${esc(s.name)}</div>
        <div class="swipe-desc">${esc(s.description)}</div>
        ${s.price?`<div class="swipe-price">💴 ${esc(s.price)}</div>`:''}
        ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="swipe-url">公式サイト →</a>`:''}
      </div>
    </div>`).reverse().join('');
  attachSwipeListeners(pendingSuggestions[swipeIdx].id);
}

function attachSwipeListeners(id) {
  const card = document.getElementById('sc-'+id);
  if (!card) return;
  let startX = 0, dragging = false;

  const onMove = (x) => {
    const dx = x - startX;
    card.style.transform = `translateX(${dx}px) rotate(${dx*.025}deg)`;
    const yes = document.getElementById('sl-yes-'+id);
    const no = document.getElementById('sl-no-'+id);
    if (yes) yes.style.opacity = dx>50 ? Math.min(1,(dx-50)/70) : 0;
    if (no) no.style.opacity = dx<-50 ? Math.min(1,(-dx-50)/70) : 0;
  };
  const onEnd = (x) => {
    dragging = false;
    document.removeEventListener('mousemove', mm);
    document.removeEventListener('mouseup', mu);
    const dx = x - startX;
    if (dx > 90) swipeYes();
    else if (dx < -90) swipeNo();
    else { card.style.transition = 'transform .3s cubic-bezier(.25,.46,.45,.94)'; card.style.transform = ''; setTimeout(()=>card.style.transition='',300); }
  };
  // Touch
  card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;dragging=true;card.style.transition='none';},{passive:true});
  card.addEventListener('touchmove',e=>{if(dragging)onMove(e.touches[0].clientX);},{passive:true});
  card.addEventListener('touchend',e=>{if(dragging)onEnd(e.changedTouches[0].clientX);});
  // Mouse
  const mm = e=>{if(dragging)onMove(e.clientX);};
  const mu = e=>{if(dragging)onEnd(e.clientX);};
  card.addEventListener('mousedown',e=>{startX=e.clientX;dragging=true;card.style.transition='none';e.preventDefault();});
  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu);
}

async function swipeYes() {
  const s = pendingSuggestions[swipeIdx]; if (!s) return;
  const card = document.getElementById('sc-'+s.id);
  if (card) card.classList.add('fly-yes');
  const newP = {id:s.id,name:s.name,url:s.url||'',memo:s.description,genre:s.genre,location:'',price:s.price||'',addedDate:todayStr(),status:'want'};
  places.push(newP);
  setSt('busy','保存中...');
  try {
    await gasAppend('places',[[newP.id,newP.name,newP.url,newP.memo,newP.genre,newP.location,newP.price,newP.addedDate,newP.status]]);
    await respondSuggestion(s.id,'yes');
    if (s.genre) {
      if (!preferences[s.genre]) preferences[s.genre]={liked:0,disliked:0};
      preferences[s.genre].liked++;
      await savePreferences();
    }
    setSt('ok','同期済み'); toast(`「${s.name}」を追加しました ♡`);
  } catch(e) { log('swipeYes: '+e.message,'err'); setSt('err','失敗'); }
  setTimeout(()=>{ swipeIdx++; renderSwipeDeck(); renderFilters(); renderWant(); renderSuggestHistory(); renderPreferences(); }, 380);
}

async function swipeNo() {
  const s = pendingSuggestions[swipeIdx]; if (!s) return;
  const card = document.getElementById('sc-'+s.id);
  if (card) card.classList.add('fly-no');
  try {
    await respondSuggestion(s.id,'no');
    if (s.genre) {
      if (!preferences[s.genre]) preferences[s.genre]={liked:0,disliked:0};
      preferences[s.genre].disliked++;
      await savePreferences();
    }
    setSt('ok','同期済み');
  } catch(e) { log('swipeNo: '+e.message,'err'); setSt('err','失敗'); }
  setTimeout(()=>{ swipeIdx++; renderSwipeDeck(); renderSuggestHistory(); renderPreferences(); }, 380);
}

async function respondSuggestion(id, response) {
  const idx = suggestions.findIndex(s=>s.id===id);
  if (idx>=0) suggestions[idx].response = response;
  await gasWrite('suggestions',[
    ['id','name','url','genre','description','price','suggestedDate','response','suggestedType'],
    ...suggestions.map(s=>[s.id,s.name,s.url,s.genre,s.description,s.price,s.suggestedDate,s.response,s.suggestedType])
  ]);
}

function renderSuggestHistory() {
  const el = document.getElementById('suggest-history');
  const responded = suggestions.filter(s=>s.response!=='pending').sort((a,b)=>b.suggestedDate.localeCompare(a.suggestedDate)).slice(0,20);
  if (!responded.length) {
    el.innerHTML='<div style="color:var(--t3);font-size:14px;padding:8px 0">まだ履歴なし</div>'; return;
  }
  el.innerHTML = responded.map(s=>{
    const c = genreColor(s.genre);
    return `<div style="display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--sep);gap:12px">
      <div style="width:36px;height:36px;border-radius:10px;background:${genreGrad(s.genre)};flex-shrink:0;display:flex;align-items:center;justify-content:center">
        <span style="font-size:16px">${s.response==='yes'?'♡':'✕'}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:600;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</div>
        <div style="font-size:12px;color:var(--t2);margin-top:2px">${s.suggestedDate} · <span style="color:${c}">${esc(s.genre)}</span></div>
      </div>
      <div style="font-size:18px;color:${s.response==='yes'?'var(--grn)':'var(--t3)'};flex-shrink:0">${s.response==='yes'?'♡':'—'}</div>
    </div>`;
  }).join('');
}

// ── Preferences ──
async function savePreferences() {
  await gasWrite('preferences',[
    ['genre','liked_count','disliked_count'],
    ...Object.entries(preferences).map(([g,v])=>[g,v.liked,v.disliked])
  ]);
}
function renderPreferences() {
  const el = document.getElementById('pref-list'); if (!el) return;
  const entries = Object.entries(preferences);
  if (!entries.length) {
    el.innerHTML='<div class="settings-row"><span class="settings-row-label" style="color:var(--t3)">まだデータなし</span></div>'; return;
  }
  el.innerHTML = entries.map(([g,v])=>`
    <div class="pref-item">
      <div class="genre-dot" style="background:${genreColor(g)};width:8px;height:8px;border-radius:50%;flex-shrink:0"></div>
      <div class="pref-genre">${esc(g)}</div>
      <div class="pref-counts"><span style="color:var(--grn)">♡ ${v.liked}</span>&nbsp;&nbsp;<span style="color:var(--t3)">✕ ${v.disliked}</span></div>
    </div>`).join('');
}
async function resetPreferences() {
  if (!confirm('学習データをリセットしますか？')) return;
  preferences = {};
  await gasWrite('preferences',[['genre','liked_count','disliked_count']]);
  renderPreferences(); toast('学習データをリセットしました');
}

// ── Startup ──
(function(){
  hideSetup();
  init();
  if (window.innerWidth >= 900) {
    document.querySelector('.dntab')?.classList.add('on');
  }
})();
</script>
</body>
</html>
