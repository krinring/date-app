<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>デートスポット</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♡</text></svg>">
<style>
/* ── VARIABLES ── */
:root{
  --bg:#07070b;
  --l1:rgba(255,255,255,.05);
  --l2:rgba(255,255,255,.08);
  --l3:rgba(255,255,255,.12);
  --sep:rgba(255,255,255,.07);
  --acc:#ff375f;--grn:#30d158;--blu:#0a84ff;
  --ora:#ff9f0a;--pur:#bf5af2;--tel:#5ac8f5;
  --txt:#fff;--t2:#8e8e93;--t3:#48484a;
  --ga:linear-gradient(135deg,#ff375f,#bf5af2);
  --gb:linear-gradient(135deg,#bf5af2,#0a84ff);
  --gc:linear-gradient(135deg,#ff375f,#ff9f0a);
  --tab:54px;--safe:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.25,.46,.45,.94);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --r:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}

/* ── BODY + AURORA ── */
body{
  background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;
  max-width:560px;margin:0 auto;min-height:100vh;
  padding-bottom:calc(var(--tab) + var(--safe) + 20px);
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 60% at 8% 0%,   rgba(191,90,242,.2)  0%,transparent 65%),
    radial-gradient(ellipse 55% 50% at 92% 100%, rgba(255,55,95,.16)  0%,transparent 65%),
    radial-gradient(ellipse 40% 50% at 50% 55%,  rgba(10,132,255,.07) 0%,transparent 65%);
  animation:aurora 14s ease-in-out infinite alternate;
}
@keyframes aurora{
  0%  {transform:translate(0,0)    scale(1)}
  100%{transform:translate(1%,2%) scale(1.05)}
}

/* ── PROGRESS BAR ── */
#prog{
  position:fixed;top:0;left:0;height:2px;width:0;z-index:9999;
  background:var(--ga);
  transition:width .4s var(--ease),opacity .5s;
  border-radius:0 2px 2px 0;pointer-events:none;
}
#prog::after{
  content:'';position:absolute;right:0;top:-1px;
  width:80px;height:4px;background:inherit;
  filter:blur(5px);opacity:.8;border-radius:2px;
}

/* ── TABBAR (mobile) ── */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:560px;
  height:calc(var(--tab) + var(--safe));
  padding-bottom:var(--safe);
  background:rgba(7,7,11,.82);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border-top:1px solid var(--sep);
  display:flex;z-index:100;
}
.tbtn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:none;color:var(--t2);
  font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;
  transition:color .2s var(--ease);letter-spacing:.2px;
}
.tbtn .ic{font-size:22px;line-height:1;transition:transform .25s var(--spring),filter .2s}
.tbtn.on{color:var(--acc)}
.tbtn.on .ic{transform:scale(1.18);filter:drop-shadow(0 0 6px rgba(255,55,95,.65))}

/* ── DESKTOP NAV / SIDEBAR ── */
.dt-nav{
  display:none;
  position:sticky;top:0;z-index:50;
  background:rgba(7,7,11,.9);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-bottom:1px solid var(--sep);
  padding:0 20px;gap:0;
}
.dntab{
  padding:16px 20px;font-size:14px;font-weight:600;
  color:var(--t2);cursor:pointer;border:none;background:none;
  font-family:inherit;border-bottom:2px solid transparent;
  transition:all .2s var(--ease);letter-spacing:-.2px;
}
.dntab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ── PANEL ── */
.pnl{display:none}
.pnl.on{display:block;animation:panelIn .32s var(--ease) both}
@keyframes panelIn{
  from{opacity:0;transform:translateY(18px)}
  to  {opacity:1;transform:translateY(0)}
}

/* ── NAV HEADER ── */
.nav-hdr{
  padding:22px 20px 0;
  display:flex;align-items:flex-end;justify-content:space-between;
  position:sticky;top:0;z-index:40;
  background:rgba(7,7,11,.86);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  padding-bottom:14px;border-bottom:1px solid var(--sep);
}
.nav-title{
  font-size:30px;font-weight:800;letter-spacing:-.7px;line-height:1;
  background:var(--ga);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:titleReveal .55s var(--ease) both;
}
@keyframes titleReveal{
  from{clip-path:inset(0 100% 0 0);opacity:0}
  to  {clip-path:inset(0 0%   0 0);opacity:1}
}
.nav-action{
  background:var(--ga);border:none;border-radius:50%;
  width:34px;height:34px;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-weight:300;line-height:1;color:#fff;
  transition:transform .15s var(--spring);flex-shrink:0;
  animation:fabGlow 4s ease-in-out infinite;
}
@keyframes fabGlow{
  0%,100%{box-shadow:0 0 14px rgba(255,55,95,.35),0 4px 16px rgba(0,0,0,.4)}
  50%    {box-shadow:0 0 28px rgba(191,90,242,.55),0 4px 22px rgba(0,0,0,.4)}
}
.nav-action:active{transform:scale(.88)}

/* ── SYNC ── */
.sync-wrap{display:flex;align-items:center;gap:6px;cursor:pointer}
.dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .4s,box-shadow .4s}
.dot.ok {background:var(--grn);box-shadow:0 0 7px rgba(48,209,88,.6)}
.dot.busy{background:var(--ora);animation:pulse .8s infinite;box-shadow:0 0 8px rgba(255,159,10,.7)}
.dot.err {background:var(--acc);box-shadow:0 0 8px rgba(255,55,95,.7)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}
.sync-txt{font-size:11px;color:var(--t2);font-variant-numeric:tabular-nums;letter-spacing:.2px}

/* ── FILTER BAR ── */
.filter-bar{
  display:flex;gap:8px;overflow-x:auto;
  padding:14px 20px 10px;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.09);
  border-radius:30px;padding:7px 18px;
  font-size:13px;font-weight:600;font-family:inherit;
  cursor:pointer;color:var(--t2);white-space:nowrap;flex-shrink:0;
  transition:all .2s var(--ease);letter-spacing:-.1px;
}
.fchip.on{
  background:var(--ga);color:#fff;border-color:transparent;
  box-shadow:0 2px 14px rgba(255,55,95,.3);
}
.fchip:hover:not(.on){background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.14)}
.fchip:active{transform:scale(.92)}

/* ── PLACE CARD ── */
.card-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:12px}
.place-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r);overflow:hidden;
  display:flex;flex-direction:column;
  cursor:default;
  transition:transform .25s var(--ease),box-shadow .25s var(--ease),border-color .25s;
  animation:cardIn .45s var(--ease) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px) scale(.98)}
  to  {opacity:1;transform:translateY(0)    scale(1)}
}
.place-card:nth-child(1){animation-delay:.04s}
.place-card:nth-child(2){animation-delay:.09s}
.place-card:nth-child(3){animation-delay:.14s}
.place-card:nth-child(4){animation-delay:.19s}
.place-card:nth-child(5){animation-delay:.24s}
.place-card:nth-child(6){animation-delay:.29s}
.place-card:nth-child(7){animation-delay:.34s}
.place-card:nth-child(n+8){animation-delay:.38s}
.place-card:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 40px rgba(0,0,0,.45);
  border-color:rgba(255,255,255,.13);
}
.place-card:active{transform:scale(.99)}
.place-card-inner{padding:18px;flex:1}
.genre-line{margin-bottom:10px}
.genre-badge{
  display:inline-block;
  font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  padding:4px 11px;border-radius:20px;
}
.place-name{font-size:18px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px;line-height:1.3}
.place-meta{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.place-meta-row{font-size:13px;color:var(--t2);display:flex;align-items:center;gap:6px}
.place-memo{
  font-size:14px;color:rgba(255,255,255,.5);line-height:1.65;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.place-card-footer{border-top:1px solid var(--sep);display:flex;background:rgba(0,0,0,.15)}
.card-btn{
  flex:1;padding:13px;font-size:13px;font-weight:600;
  font-family:inherit;border:none;background:none;
  cursor:pointer;color:var(--t2);
  transition:background .15s,color .15s;letter-spacing:-.1px;
}
.card-btn:active{background:rgba(255,255,255,.05)}
.card-btn.primary{color:var(--grn)}
.card-btn.danger{color:rgba(255,55,95,.75)}
.card-btn-sep{width:1px;background:var(--sep);flex-shrink:0}

/* ── ARCHIVE CARD ── */
.archive-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r);padding:18px;
  display:flex;flex-direction:column;gap:10px;
  animation:cardIn .4s var(--ease) both;
  transition:transform .25s var(--ease),box-shadow .25s;
}
.archive-card:nth-child(1){animation-delay:.04s}
.archive-card:nth-child(2){animation-delay:.09s}
.archive-card:nth-child(3){animation-delay:.14s}
.archive-card:nth-child(4){animation-delay:.19s}
.archive-card:nth-child(n+5){animation-delay:.24s}
.archive-card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.archive-card-top{display:flex;align-items:flex-start;gap:12px}
.archive-stars{color:#f5c518;font-size:14px;letter-spacing:1px;flex-shrink:0;filter:drop-shadow(0 1px 4px rgba(245,197,24,.3))}
.archive-name{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.3}
.archive-date{font-size:12px;color:var(--t2);margin-top:2px;font-variant-numeric:tabular-nums}
.archive-impression{
  font-size:14px;color:rgba(255,255,255,.68);line-height:1.7;
  border-left:2px solid var(--acc);padding-left:14px;font-style:italic;
}
.archive-link{font-size:12px;color:var(--blu)}

/* ── SORT ROW ── */
.sort-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px 12px;
}
.sort-sel{
  background:none;border:none;color:var(--t2);
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  padding:0;appearance:none;-webkit-appearance:none;
}

/* ── SWIPE ── */
.swipe-wrap{padding:20px 16px 0;width:100%;box-sizing:border-box}
.swipe-section-title{
  font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:18px;
  background:var(--gb);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.swipe-stack{
  position:relative;height:430px;
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
}
.swipe-card{
  position:absolute;
  width:100%;max-width:360px;height:410px;
  border-radius:28px;overflow:hidden;
  cursor:grab;user-select:none;touch-action:pan-y;
  will-change:transform;
  box-shadow:0 24px 60px rgba(0,0,0,.55);
}
.swipe-card:active{cursor:grabbing}
.swipe-card-bg{position:absolute;inset:0}
.swipe-card-content{
  position:absolute;bottom:0;left:0;right:0;padding:28px 24px;
  background:linear-gradient(to top,rgba(0,0,0,.96) 0%,rgba(0,0,0,.55) 55%,transparent 100%);
}
.swipe-type-badge{
  display:inline-block;padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:12px;
  background:rgba(255,255,255,.12);backdrop-filter:blur(12px);
  color:#fff;border:1px solid rgba(255,255,255,.16);
}
.swipe-genre{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:5px;letter-spacing:.6px;text-transform:uppercase}
.swipe-name{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:8px}
.swipe-desc{font-size:14px;color:rgba(255,255,255,.65);line-height:1.65;margin-bottom:12px}
.swipe-price{font-size:13px;color:rgba(255,255,255,.5)}
.swipe-url{display:block;margin-top:6px;font-size:12px;color:var(--tel)}
.swipe-label{
  position:absolute;top:24px;
  font-size:20px;font-weight:800;letter-spacing:.5px;
  opacity:0;transition:opacity .06s;
  pointer-events:none;padding:7px 14px;border-radius:12px;backdrop-filter:blur(12px);
}
.swipe-label.yes{right:20px;color:var(--grn);border:2px solid var(--grn);background:rgba(48,209,88,.15)}
.swipe-label.no{left:20px;color:var(--acc);border:2px solid var(--acc);background:rgba(255,55,95,.15)}
@keyframes flyRight{to{transform:translateX(150%) rotate(20deg);opacity:0}}
@keyframes flyLeft {to{transform:translateX(-150%) rotate(-20deg);opacity:0}}
.fly-yes{animation:flyRight .4s var(--ease) forwards;pointer-events:none}
.fly-no {animation:flyLeft  .4s var(--ease) forwards;pointer-events:none}
.swipe-actions{
  display:none;justify-content:center;align-items:center;gap:32px;margin-top:24px;
}
.action-btn{
  width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;
  font-size:28px;display:flex;align-items:center;justify-content:center;
  transition:transform .15s var(--spring),box-shadow .2s;
}
.action-btn:active{transform:scale(.86)!important}
.action-no{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);color:var(--txt);
}
.action-no:hover{background:rgba(255,55,95,.1);border-color:rgba(255,55,95,.4);transform:scale(1.05)}
.action-yes{
  background:var(--ga);
  box-shadow:0 8px 24px rgba(255,55,95,.38);
}
.action-yes:hover{transform:scale(1.06)!important;box-shadow:0 12px 32px rgba(255,55,95,.55)}
.suggest-gen-btn{
  display:block;width:calc(100% - 32px);margin:20px auto 0;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:var(--txt);border-radius:18px;padding:17px;
  font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;text-align:center;letter-spacing:-.2px;
  transition:background .2s,border-color .2s,transform .15s var(--spring);
}
.suggest-gen-btn:hover{background:rgba(255,55,95,.1);border-color:rgba(255,55,95,.3)}
.suggest-gen-btn:active{transform:scale(.97)}
.suggest-gen-btn:disabled{opacity:.4;cursor:not-allowed}
.suggest-ai-status{
  margin:14px auto 0;width:calc(100% - 32px);padding:16px;
  background:rgba(255,55,95,.06);border-radius:14px;
  font-size:13px;color:var(--t2);line-height:1.7;
  border:1px solid rgba(255,55,95,.18);display:none;
}
.suggest-history-section{padding:28px 16px 0}
.suggest-history-title{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:16px;color:var(--t2)}

/* ── EMPTY STATE ── */
.empty-state{
  text-align:center;padding:64px 20px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.empty-icon{font-size:52px;line-height:1;margin-bottom:6px;filter:drop-shadow(0 4px 18px rgba(255,55,95,.3))}
.empty-title{font-size:18px;font-weight:700;letter-spacing:-.4px;color:rgba(255,255,255,.65)}
.empty-sub{font-size:14px;color:var(--t3);line-height:1.65;max-width:240px}

/* ── SETTINGS ── */
.settings-section{padding:28px 20px 0}
.settings-title{font-size:12px;font-weight:700;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;padding:0 4px}
.settings-group{background:rgba(255,255,255,.04);border:1px solid var(--sep);border-radius:18px;overflow:hidden}
.settings-row{display:flex;align-items:center;padding:16px 18px;border-bottom:1px solid var(--sep);gap:12px}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:15px;font-weight:500;flex:1;letter-spacing:-.2px}
.settings-input{
  background:none;border:none;color:var(--txt);font-family:inherit;
  font-size:15px;text-align:right;outline:none;width:100%;
  padding:0;letter-spacing:-.1px;
}
.settings-input::placeholder{color:var(--t3)}
.settings-btn{
  padding:16px 18px;font-size:15px;font-weight:500;
  text-align:left;cursor:pointer;width:100%;
  background:none;border:none;font-family:inherit;color:var(--acc);
  border-bottom:1px solid var(--sep);letter-spacing:-.2px;transition:background .15s;
}
.settings-btn:last-child{border-bottom:none}
.settings-btn:active{background:rgba(255,255,255,.04)}
.pref-item{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--sep);gap:10px}
.pref-item:last-child{border-bottom:none}
.pref-genre{font-size:15px;font-weight:500;flex:1;letter-spacing:-.2px}
.pref-counts{font-size:13px;color:var(--t2)}

/* ── MODAL / SHEET ── */
.sheet-ov{
  position:fixed;inset:0;z-index:9000;display:flex;align-items:flex-end;
  background:rgba(0,0,0,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
@media(min-width:600px){.sheet-ov{align-items:center;justify-content:center}}
.sheet{
  background:rgba(16,16,20,.97);
  border:1px solid rgba(255,255,255,.1);
  border-radius:28px 28px 0 0;
  width:100%;max-width:540px;max-height:92vh;
  overflow-y:auto;padding:0 0 calc(var(--safe) + 16px);
  animation:slideUp .36s var(--spring);
}
@media(min-width:600px){.sheet{border-radius:24px;max-height:82vh;padding-bottom:0}}
@keyframes slideUp{from{transform:translateY(100%);opacity:.3}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.14);margin:14px auto 0}
.sheet-header{padding:22px 22px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sheet-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.sheet-close{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:50%;
  width:32px;height:32px;font-size:16px;color:var(--t2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;font-family:inherit;font-weight:300;
}
.sheet-close:active{background:rgba(255,255,255,.14)}
.sheet-body{padding:18px 22px}
.form-group{margin-bottom:18px}
.form-label{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:9px;display:block}
.form-input{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;
  color:var(--txt);font-family:inherit;font-size:15px;
  padding:14px 16px;width:100%;outline:none;
  transition:border-color .2s,box-shadow .2s;letter-spacing:-.1px;
}
.form-input:focus{border-color:rgba(255,55,95,.5);box-shadow:0 0 0 3px rgba(255,55,95,.12)}
.form-input::placeholder{color:rgba(255,255,255,.2)}
textarea.form-input{resize:none;line-height:1.65}
select.form-input{appearance:none;-webkit-appearance:none;cursor:pointer}
select.form-input option{background:#18181c}
.form-row{display:flex;gap:12px}
.form-row>.form-group{flex:1;margin-bottom:0}
.ai-btn{
  background:rgba(90,200,245,.1);border:1px solid rgba(90,200,245,.25);border-radius:12px;
  color:var(--tel);font-family:inherit;font-size:13px;font-weight:700;
  padding:10px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .2s var(--ease);letter-spacing:-.1px;
  align-self:flex-end;height:46px;
}
.ai-btn:hover{background:rgba(90,200,245,.16);border-color:rgba(90,200,245,.42)}
.ai-btn:active{transform:scale(.95)}
.ai-btn:disabled{opacity:.4;cursor:not-allowed}
.ai-status{
  background:rgba(255,55,95,.06);border:1px solid rgba(255,55,95,.18);border-radius:12px;
  padding:12px 14px;font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.5;display:none;
}
.sheet-actions{display:flex;gap:12px;padding:0 22px 6px}
.sheet-btn{
  flex:1;padding:16px;border:none;border-radius:16px;
  font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-.3px;
  transition:transform .15s var(--spring),box-shadow .2s;
}
.sheet-btn:active{transform:scale(.97)}
.sheet-btn.primary{background:var(--ga);color:#fff;box-shadow:0 6px 20px rgba(255,55,95,.3)}
.sheet-btn.primary:hover{box-shadow:0 8px 28px rgba(255,55,95,.46)}
.sheet-btn.secondary{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid rgba(255,255,255,.1)}

/* ── STARS ── */
.star-wrap{display:flex;gap:10px;padding:4px 0}
.star{font-size:32px;cursor:pointer;color:rgba(255,255,255,.1);transition:color .12s,transform .12s var(--spring);line-height:1}
.star.on{color:#f5c518;filter:drop-shadow(0 2px 6px rgba(245,197,24,.45))}
.star:active{transform:scale(.84)}

/* ── DEBUG ── */
#dbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;padding:16px;gap:10px}
#dbg.on{display:flex}
#dbg-log{flex:1;overflow-y:auto;font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.9;color:#ccc;white-space:pre-wrap;background:rgba(255,255,255,.04);border-radius:12px;padding:12px;border:1px solid var(--sep)}
.derr{color:var(--acc)}.dok{color:var(--grn)}.dinf{color:var(--ora)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--tab) + var(--safe) + 16px);
  left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(28,28,34,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  color:#fff;font-weight:600;padding:11px 22px;border-radius:30px;
  font-size:14px;letter-spacing:-.2px;
  opacity:0;transition:all .28s var(--ease);
  pointer-events:none;z-index:9998;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SETUP SCREEN ── */
.setup-screen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 24px;gap:32px;
}
.setup-icon{font-size:72px;line-height:1;text-align:center;filter:drop-shadow(0 8px 28px rgba(255,55,95,.4))}
.setup-title{
  font-size:32px;font-weight:800;letter-spacing:-.7px;text-align:center;
  background:var(--ga);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.setup-sub{font-size:15px;color:var(--t2);text-align:center;line-height:1.7;max-width:300px}
.setup-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px}
.setup-link{font-size:13px;color:var(--blu);text-align:center;text-decoration:none;cursor:pointer}

/* ── DESKTOP ── */
@media(min-width:900px){
  body{max-width:100%;padding-bottom:0}
  body::before{
    background:
      radial-gradient(ellipse 45% 80% at 0% 50%,  rgba(191,90,242,.13) 0%,transparent 60%),
      radial-gradient(ellipse 40% 60% at 100% 5%,  rgba(255,55,95,.1)  0%,transparent 60%),
      radial-gradient(ellipse 35% 45% at 100% 95%, rgba(10,132,255,.07) 0%,transparent 60%);
  }
  #app{display:flex;min-height:100vh}
  .tabbar{display:none!important}
  /* Sidebar */
  .dt-nav{
    display:flex!important;flex-direction:column;
    width:230px;min-width:230px;flex-shrink:0;
    position:sticky;top:0;height:100vh;
    border-right:1px solid var(--sep);border-bottom:none;
    padding:0;gap:0;
    background:rgba(7,7,11,.97);
    backdrop-filter:blur(40px) saturate(200%);
    -webkit-backdrop-filter:blur(40px) saturate(200%);
  }
  .dntab{
    padding:14px 24px;text-align:left;width:100%;
    border-bottom:none!important;border-left:3px solid transparent;
    font-size:14px;font-weight:500;border-radius:0;letter-spacing:-.1px;
  }
  .dntab.on{
    color:#fff!important;-webkit-text-fill-color:#fff!important;
    border-left-color:var(--acc);
    background:rgba(255,55,95,.08);
  }
  .dntab:hover:not(.on){background:rgba(255,255,255,.04)}
  .dt-sync-area{
    margin-top:auto;padding:18px 22px;border-top:1px solid var(--sep);
    display:flex;align-items:center;gap:8px;cursor:pointer;
  }
  /* Main */
  #dt-main{flex:1;min-width:0;overflow-y:auto;max-height:100vh}
  .pnl{display:none}.pnl.on{display:block!important;max-width:940px;padding:0 8px}
  /* Grids */
  .card-list{
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    gap:14px;padding:0 20px 28px;
  }
  #archive-list{
    display:grid!important;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:14px;
  }
  /* Sections */
  .swipe-wrap{max-width:480px;margin:0 auto}
  .suggest-gen-btn{max-width:480px;margin:20px auto 0}
  .suggest-history-section{max-width:880px;margin:0 auto}
  .settings-section{max-width:620px;margin:0 auto}
  .toast{bottom:28px}
}
</style>
</head>

<script>
// ── Constants ──
const CLAUDE_API = 'https://api.anthropic.com/v1/messages';
const _GAS_URL = 'https://script.google.com/macros/s/AKfycbyjXAXZ3NMtoBnIFYVaZrs8N8U1izheQ9DMt4ouR1INJH-MCXRY5ihRuMbutDVq2TJW/exec';
let GAS = localStorage.getItem('gas_url') || _GAS_URL;

// ── Data ──
let places = [], archived = [], suggestions = [], preferences = {}, config = {};

// ── UI state ──
let cbCtr = 0, dbgLines = [], useFetch = true;
let wantFilter = 'all', archiveFilter = 'all';
let swipeIdx = 0, pendingSuggestions = [];
let editingId = null, visitingId = null, currentRating = 0;

// ── Genre system ──
const GENRE_COLOR = {
  'レストラン':'#ff9f0a','カフェ':'#c07840','美術館':'#bf5af2',
  '博物館':'#bf5af2','公園':'#30d158','ショッピング':'#0a84ff',
  'イベント':'#ff375f','季節限定':'#5ac8f5','その他':'#636366'
};
const GENRE_GRAD = {
  'レストラン':'linear-gradient(145deg,#1a0a02,#3d1a05)',
  'カフェ':'linear-gradient(145deg,#150c02,#2d1a08)',
  '美術館':'linear-gradient(145deg,#0d0019,#280050)',
  '博物館':'linear-gradient(145deg,#0a0019,#220045)',
  '公園':'linear-gradient(145deg,#001800,#003800)',
  'ショッピング':'linear-gradient(145deg,#00051a,#001050)',
  'イベント':'linear-gradient(145deg,#1a0008,#400018)',
  '季節限定':'linear-gradient(145deg,#001a20,#004050)',
  'その他':'linear-gradient(145deg,#0a0a0a,#1c1c1e)'
};
function genreColor(g){ return GENRE_COLOR[g]||'#636366'; }
function genreGrad(g){ return GENRE_GRAD[g]||GENRE_GRAD['その他']; }

// ── Helpers ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr(){ const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function normDate(s){ s=String(s||'');if(!s)return'';if(s.includes('T')){const d=new Date(s);if(!isNaN(d))return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}return s.slice(0,10); }
function setSt(s,t){
  ['dot','dot-mobile'].forEach(id=>{const el=document.getElementById(id);if(el)el.className='dot '+s;});
  const el=document.getElementById('sync-txt');if(el)el.textContent=t;
  const p=document.getElementById('prog');
  if(p){
    if(s==='busy'){p.style.width='65%';p.style.opacity='1';}
    else{p.style.width='100%';setTimeout(()=>{p.style.opacity='0';setTimeout(()=>{p.style.width='0';p.style.opacity='1';},450);},300);}
  }
}
function toast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2600); }
function log(msg,type=''){ const ts=new Date().toTimeString().slice(0,8);const cls=type?` class="d${type}"`:' class="dinf"';dbgLines.push(`<span${cls}>[${ts}] ${String(msg).replace(/</g,'&lt;')}</span>`);if(dbgLines.length>300)dbgLines.shift();const el=document.getElementById('dbg-log');el.innerHTML=dbgLines.join('\n');el.scrollTop=el.scrollHeight; }
function toggleDbg(){ document.getElementById('dbg').classList.toggle('on'); }
function priceSortVal(s){ const m=String(s||'').replace(/[,，￥¥]/g,'').match(/\d+/);return m?parseInt(m[0]):99999; }

// ── Auth ──
function showSetup(){
  document.getElementById('setup-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function hideSetup(){
  document.getElementById('setup-screen').style.display='none';

// ── GAS ──
async function gasCall(params){
  if(!GAS)throw new Error('GAS URLが未設定です。設定タブで入力してください。');
  const qs=Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  if(useFetch){
    try{
      log(`fetch→ ${params.action}[${params.sheet||''}]`);
      const r=await fetch(GAS+'?'+qs,{redirect:'follow'});
      const text=await r.text();
      log('raw: '+text.slice(0,80));
      const json=JSON.parse(text);
      if(json.ok!==undefined){log('OK','ok');return json;}
    }catch(e){log(`fetch失敗(${e.message})→JSONP`,'err');useFetch=false;}
  }
  return jsonpCall(params);
}
function jsonpCall(params){
  return new Promise((resolve,reject)=>{
    const name='__cb'+(cbCtr++);let done=false;
    const timer=setTimeout(()=>{if(done)return;done=true;cleanup();reject(new Error('timeout'))},15000);
    window[name]=(d)=>{if(done)return;done=true;clearTimeout(timer);cleanup();resolve(d)};
    const cleanup=()=>{delete window[name];const s=document.getElementById('_s'+name);if(s)s.remove()};
    const qs=Object.entries({...params,callback:name}).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const sc=document.createElement('script');sc.id='_s'+name;sc.src=GAS+'?'+qs;
    sc.onerror=()=>{if(done)return;done=true;clearTimeout(timer);cleanup();reject(new Error('script error'))};
    log(`jsonp→ ${params.action}[${params.sheet||''}]`);document.head.appendChild(sc);
  });
}
async function gasRead(sheet){const r=await gasCall({action:'read',sheet});if(!r.ok)throw new Error(r.error||'read failed');log(`read ${sheet} (${(r.data||[]).length}行)`,'ok');return r.data||[]}
async function gasWrite(sheet,rows){const r=await gasCall({action:'write',sheet,rows:JSON.stringify(rows)});if(!r.ok)throw new Error(r.error||'write failed');log(`write ${sheet}`,'ok')}
async function gasAppend(sheet,rows){const r=await gasCall({action:'append',sheet,rows:JSON.stringify(rows)});if(!r.ok)throw new Error(r.error||'append failed');log(`append ${sheet}`,'ok')}
function parseRows(rows){if(!rows||!rows.length)return[];const f=rows[0];const isH=f.length>0&&typeof f[0]==='string'&&isNaN(f[0])&&f[0]!=='';return isH?rows.slice(1):rows}

// ── Claude ──
async function askClaude(prompt,maxTok=1400){
  const k=localStorage.getItem('claude_api_key')||config['claude_api_key']||'';
  if(!k){showSetup();throw new Error('APIキーが未設定です');}
  log('Claude→ '+prompt.slice(0,50)+'...');
  const r=await fetch(CLAUDE_API,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  log('Claude OK','ok');
  return d.content?.[0]?.text||'';
}

// ── Init ──
async function init(){
  if(!GAS){setSt('err','GAS URL未設定');tab('settings',null);document.querySelectorAll('.tbtn').forEach((b,i)=>{b.classList.toggle('on',i===3);});toast('設定タブでGAS URLを入力してください');return;}
  useFetch=true;setSt('busy','読み込み中...');log('=== init ===');
  try{
    const[pD,aD,sD,prD,cD]=await Promise.all([
      gasRead('places'),gasRead('archived'),gasRead('suggestions'),
      gasRead('preferences'),gasRead('config')
    ]);
    places=parseRows(pD).map(r=>({id:String(r[0]),name:String(r[1]||''),url:String(r[2]||''),memo:String(r[3]||''),genre:String(r[4]||''),location:String(r[5]||''),price:String(r[6]||''),addedDate:normDate(r[7]),status:String(r[8]||'want')})).filter(r=>r.name);
    archived=parseRows(aD).map(r=>({id:String(r[0]),name:String(r[1]||''),url:String(r[2]||''),memo:String(r[3]||''),genre:String(r[4]||''),location:String(r[5]||''),price:String(r[6]||''),visitDate:normDate(r[7]),impression:String(r[8]||''),rating:parseInt(r[9])||0})).filter(r=>r.name);
    suggestions=parseRows(sD).map(r=>({id:String(r[0]),name:String(r[1]||''),url:String(r[2]||''),genre:String(r[3]||''),description:String(r[4]||''),price:String(r[5]||''),suggestedDate:normDate(r[6]),response:String(r[7]||'pending'),suggestedType:String(r[8]||'')})).filter(r=>r.name);
    preferences={};
    parseRows(prD).forEach(r=>{if(r[0])preferences[String(r[0])]={liked:parseInt(r[1])||0,disliked:parseInt(r[2])||0};});
    config=Object.fromEntries(parseRows(cD).map(r=>[String(r[0]),String(r[1]||'')]));
    if(config['claude_api_key']&&!localStorage.getItem('claude_api_key')){
      localStorage.setItem('claude_api_key',config['claude_api_key']);
    }
    log(`場所:${places.length} アーカイブ:${archived.length} 提案:${suggestions.length}`,'ok');
    renderAll();setSt('ok','同期済み');
  }catch(e){
    log('init ERROR: '+e.message,'err');
    setSt('err','エラー（タップで詳細）');
    toast('接続失敗 — ステータスをタップして確認');
  }
}
function renderAll(){
  renderFilters();renderWant();renderArchive();
  pendingSuggestions=suggestions.filter(s=>s.response==='pending');
  swipeIdx=0;renderSwipeDeck();renderSuggestHistory();renderPreferences();
  document.getElementById('s-key').value=localStorage.getItem('claude_api_key')||'';
  document.getElementById('s-gas').value=GAS;
}

function renderFilters(){
  const wg=[...new Set(places.filter(p=>p.genre).map(p=>p.genre))];
  const ag=[...new Set(archived.filter(p=>p.genre).map(p=>p.genre))];
  const make=(barId,genres,cur,fn)=>{
    const bar=document.getElementById(barId);
    bar.innerHTML=`<button class="fchip ${cur==='all'?'on':''}" onclick="${fn}('all',this)">すべて</button>`;
    genres.forEach(g=>bar.innerHTML+=`<button class="fchip ${cur===g?'on':''}" onclick="${fn}('${esc(g)}',this)">${esc(g)}</button>`);
  };
  make('want-filters',wg,wantFilter,'filterWant');
  make('archive-filters',ag,archiveFilter,'filterArchive');
}
function filterWant(g,btn){
  wantFilter=g;
  document.querySelectorAll('#want-filters .fchip').forEach(b=>b.classList.remove('on'));

}
function filterArchive(g,btn){
  archiveFilter=g;
  document.querySelectorAll('#archive-filters .fchip').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');

// ── Place Cards ──
function renderWant(){
  let list=places.filter(p=>p.status==='want');
  if(wantFilter!=='all')list=list.filter(p=>p.genre===wantFilter);
  const sort=document.getElementById('want-sort')?.value||'date-desc';
  const labels={'date-desc':'追加日（新→古）','date-asc':'追加日（古→新）','name-asc':'名前順','price-asc':'価格（安→高）'};
  const lbl=document.getElementById('want-sort-lbl');if(lbl)lbl.textContent=labels[sort]||sort;
  if(sort==='date-desc')list.sort((a,b)=>b.addedDate.localeCompare(a.addedDate));
  else if(sort==='date-asc')list.sort((a,b)=>a.addedDate.localeCompare(b.addedDate));
  else if(sort==='name-asc')list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  else if(sort==='price-asc')list.sort((a,b)=>priceSortVal(a.price)-priceSortVal(b.price));
  const grid=document.getElementById('want-grid');
  const empty=document.getElementById('want-empty');
  const cnt=document.getElementById('want-count');
  if(cnt)cnt.textContent=list.length?`${list.length}件`:'';
  if(!list.length){grid.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(p=>placeCardHTML(p)).join('');
}
function placeCardHTML(p){
  const c=genreColor(p.genre);
  let linkEl='';
  try{if(p.url)linkEl=`<a href="${esc(p.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:12px;color:var(--blu);display:block;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${new URL(p.url).hostname}</a>`;}catch(e){}
  return`<div class="place-card">
    <div class="place-card-inner">
      ${p.genre?`<div class="genre-line"><span class="genre-badge" style="background:${c}22;color:${c}">${esc(p.genre)}</span></div>`:''}
      <div class="place-name">${esc(p.name)}</div>

        ${p.location?`<div class="place-meta-row"><span style="opacity:.45">📍</span>${esc(p.location)}</div>`:''}
        ${p.price?`<div class="place-meta-row"><span style="opacity:.45">💴</span>${esc(p.price)}</div>`:''}
      </div>
      ${p.memo?`<div class="place-memo">${esc(p.memo)}</div>`:''}

  document.getElementById('pm-name').value=p.name;
  document.getElementById('pm-url').value=p.url;
  document.getElementById('pm-location').value=p.location;
  document.getElementById('pm-price').value=p.price;

function closePlaceSheet(){document.getElementById('place-sheet').style.display='none';}
async function savePlace(){
  const name=document.getElementById('pm-name').value.trim();
  if(!name)return toast('名前を入力してください');
  const data={name,url:document.getElementById('pm-url').value.trim(),location:document.getElementById('pm-location').value.trim(),price:document.getElementById('pm-price').value.trim(),genre:document.getElementById('pm-genre').value,memo:document.getElementById('pm-memo').value.trim()};
  setSt('busy','保存中...');closePlaceSheet();
  try{
    if(editingId){
      const idx=places.findIndex(p=>p.id===editingId);
      if(idx>=0)places[idx]={...places[idx],...data};
      await gasWrite('places',[['id','name','url','memo','genre','location','price','addedDate','status'],...places.map(p=>[p.id,p.name,p.url,p.memo,p.genre,p.location,p.price,p.addedDate,p.status])]);
      toast('更新しました');
    }else{
      const id=Date.now().toString();
      const newP={id,...data,addedDate:todayStr(),status:'want'};
      if(!places.length){
        await gasWrite('places',[['id','name','url','memo','genre','location','price','addedDate','status'],[id,data.name,data.url,data.memo,data.genre,data.location,data.price,todayStr(),'want']]);
      }else{
        await gasAppend('places',[[id,data.name,data.url,data.memo,data.genre,data.location,data.price,todayStr(),'want']]);
      }
      places.push(newP);toast('追加しました');
    }
    renderFilters();renderWant();setSt('ok','同期済み');
  }catch(e){log('savePlace: '+e.message,'err');setSt('err','保存失敗');toast('保存失敗: '+e.message);}
}
async function deletePlace(id){
  if(!confirm('削除しますか？'))return;
  setSt('busy','削除中...');
  try{
    places=places.filter(p=>p.id!==id);
    await gasWrite('places',[['id','name','url','memo','genre','location','price','addedDate','status'],...places.map(p=>[p.id,p.name,p.url,p.memo,p.genre,p.location,p.price,p.addedDate,p.status])]);
    renderFilters();renderWant();setSt('ok','同期済み');toast('削除しました');
  }catch(e){log('delete: '+e.message,'err');setSt('err','削除失敗');}
}

async function autoExtract(){
  const name=document.getElementById('pm-name').value.trim();
  if(!name)return toast('まず名前を入力してください');
  const btn=document.getElementById('btn-extract');
  const status=document.getElementById('extract-status');
  btn.disabled=true;status.style.display='block';
  status.textContent=`「${name}」の情報を取得中...`;
  try{
    const text=await askClaude(`日本語で「${name}」についてJSONのみ。前置き不要。\n{"url":"公式URL or null","location":"エリア・住所","price":"価格帯 or null","genre":"レストラン/カフェ/美術館/博物館/公園/ショッピング/イベント/季節限定/その他","description":"60文字程度の魅力的な説明"}`,600);
    const json=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(json.url&&json.url!=='null')document.getElementById('pm-url').value=json.url;
    if(json.location&&json.location!=='null')document.getElementById('pm-location').value=json.location;
    if(json.price&&json.price!=='null')document.getElementById('pm-price').value=json.price;
    if(json.genre)document.getElementById('pm-genre').value=json.genre;
    if(json.description&&!document.getElementById('pm-memo').value)document.getElementById('pm-memo').value=json.description;
    status.textContent='✓ 情報を取得しました。確認して保存してください。';
    status.style.borderColor='rgba(48,209,88,.4)';status.style.background='rgba(48,209,88,.06)';
    toast('情報を自動入力しました');
  }catch(e){status.textContent='取得失敗: '+e.message;log('autoExtract: '+e.message,'err');}
  btn.disabled=false;
}

// ── Archive ──
function openVisitModal(id){
  visitingId=id;const p=places.find(x=>x.id===id);if(!p)return;
  document.getElementById('vm-name').textContent=p.name;
  document.getElementById('vm-date').value=todayStr();
  document.getElementById('vm-impression').value='';
  currentRating=0;renderStars(0);
  document.getElementById('visit-sheet').style.display='flex';
}
function setRating(v){currentRating=v;renderStars(v);}
function renderStars(v){document.querySelectorAll('#vm-stars .star').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.v)<=v));}
async function submitVisit(){
  const p=places.find(x=>x.id===visitingId);if(!p)return;
  if(!currentRating)return toast('評価（★）を選んでください');
  const visitDate=document.getElementById('vm-date').value||todayStr();
  const impression=document.getElementById('vm-impression').value.trim();
  document.getElementById('visit-sheet').style.display='none';
  setSt('busy','保存中...');
  try{
    const archRow=[p.id,p.name,p.url,p.memo,p.genre,p.location,p.price,visitDate,impression,currentRating];
    if(!archived.length){await gasWrite('archived',[['id','name','url','memo','genre','location','price','visitDate','impression','rating'],archRow]);}
    else{await gasAppend('archived',[archRow]);}
    archived.unshift({...p,visitDate,impression,rating:currentRating});
    places=places.filter(x=>x.id!==visitingId);
    await gasWrite('places',[['id','name','url','memo','genre','location','price','addedDate','status'],...places.map(x=>[x.id,x.name,x.url,x.memo,x.genre,x.location,x.price,x.addedDate,x.status])]);
    if(p.genre){if(!preferences[p.genre])preferences[p.genre]={liked:0,disliked:0};preferences[p.genre].liked++;await savePreferences();}
    renderFilters();renderWant();renderArchive();renderPreferences();
    setSt('ok','同期済み');toast(`「${p.name}」をアーカイブしました`);
  }catch(e){log('submitVisit: '+e.message,'err');setSt('err','失敗');}
}
function renderArchive(){
  let list=[...archived];
  if(archiveFilter!=='all')list=list.filter(p=>p.genre===archiveFilter);
  const sort=document.getElementById('archive-sort')?.value||'date-desc';
  const labels={'date-desc':'訪問日（新→古）','date-asc':'訪問日（古→新）','rating-desc':'評価（高→低）'};
  const lbl=document.getElementById('archive-sort-lbl');if(lbl)lbl.textContent=labels[sort]||sort;
  if(sort==='date-desc')list.sort((a,b)=>b.visitDate.localeCompare(a.visitDate));
  else if(sort==='date-asc')list.sort((a,b)=>a.visitDate.localeCompare(b.visitDate));
  else if(sort==='rating-desc')list.sort((a,b)=>b.rating-a.rating);
  const el=document.getElementById('archive-list');
  const empty=document.getElementById('archive-empty');
  if(!list.length){el.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  el.innerHTML=list.map(p=>{
    const stars='★'.repeat(p.rating)+'☆'.repeat(5-p.rating);
    const c=genreColor(p.genre);
    let link='';
    try{if(p.url)link=`<a href="${esc(p.url)}" target="_blank" rel="noopener" class="archive-link">${new URL(p.url).hostname}</a>`;}catch(e){}
    return`<div class="archive-card">
      <div class="archive-card-top">
        <div style="flex:1">
          ${p.genre?`<div style="margin-bottom:8px"><span class="genre-badge" style="background:${c}22;color:${c}">${esc(p.genre)}</span></div>`:''}
          <div class="archive-name">${esc(p.name)}</div>
          ${p.location?`<div class="archive-date" style="margin-top:4px">📍 ${esc(p.location)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="archive-stars">${stars}</div>
          <div class="archive-date">${p.visitDate}</div>
          ${p.price?`<div class="archive-date">💴 ${esc(p.price)}</div>`:''}
        </div>
      </div>
      ${p.impression?`<div class="archive-impression">${esc(p.impression)}</div>`:''}
      ${link}
    </div>`;
  }).join('');
}

// ── Suggestions ──
async function generateSuggestions(){
  const btn=document.getElementById('btn-gen-suggest');
  const status=document.getElementById('suggest-ai-status');
  btn.disabled=true;status.style.display='block';status.textContent='✦ AIが考え中です...';
  const prefStr=Object.entries(preferences).map(([g,v])=>`${g}:好き${v.liked}/嫌い${v.disliked}`).join(', ')||'データなし';
  const visited=archived.slice(0,15).map(p=>p.name).join('、')||'なし';
  const want=places.slice(0,10).map(p=>p.name).join('、')||'なし';
  const today=todayStr();const month=today.slice(5,7);
  try{
    const text=await askClaude(
      `あなたはカップルのデートプランナーです。今日（${today}）を考慮し新鮮なデートスポット5件を提案してください。\n\nユーザー好み: ${prefStr}\n行った場所: ${visited}\n行きたいリスト: ${want}\n\n提案タイプ各1〜2件: opening(新オープン), exhibition(展示中), seasonal(${month}月旬), event(期間限定)\n\nJSONのみ。前置き不要。リストや行った場所は除外。\n{"suggestions":[{"name":"場所名","url":"公式URL or null","genre":"レストラン/カフェ/美術館/博物館/公園/ショッピング/イベント/季節限定/その他","description":"カップル向け60文字の説明","price":"価格帯 or null","suggestedType":"opening/exhibition/seasonal/event"}]}`,
      2000
    );
    const json=JSON.parse(text.replace(/```json|```/g,'').trim());
    const newS=(json.suggestions||[]).map(s=>({
      id:(Date.now()+Math.random()).toString().replace('.',''),
      name:s.name,url:s.url&&s.url!=='null'?s.url:'',
      genre:s.genre||'その他',description:s.description||'',
      price:s.price&&s.price!=='null'?s.price:'',
      suggestedDate:today,response:'pending',suggestedType:s.suggestedType||'event'
    }));
    if(newS.length){
      if(!suggestions.length){await gasWrite('suggestions',[['id','name','url','genre','description','price','suggestedDate','response','suggestedType'],...newS.map(s=>[s.id,s.name,s.url,s.genre,s.description,s.price,s.suggestedDate,s.response,s.suggestedType])]);}
      else{await gasAppend('suggestions',newS.map(s=>[s.id,s.name,s.url,s.genre,s.description,s.price,s.suggestedDate,s.response,s.suggestedType]));}
      suggestions.push(...newS);
    }
    pendingSuggestions=suggestions.filter(s=>s.response==='pending');
    swipeIdx=0;renderSwipeDeck();renderSuggestHistory();
    status.style.display='none';toast(`${newS.length}件の提案を生成しました`);
  }catch(e){status.textContent='エラー: '+e.message;log('generateSuggestions: '+e.message,'err');}
  btn.disabled=false;
}

function renderSwipeDeck(){
  const stack=document.getElementById('swipe-stack');
  const btns=document.getElementById('swipe-btns');
  pendingSuggestions=suggestions.filter(s=>s.response==='pending');
  if(!pendingSuggestions.length){
    stack.innerHTML=`<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-title">提案を生成しよう</div><div class="empty-sub">AIが二人に合うスポットをセレクトします</div></div>`;
    btns.style.display='none';return;
  }
  const cur=pendingSuggestions.slice(swipeIdx,swipeIdx+3);
  if(!cur.length){
    stack.innerHTML=`<div class="empty-state"><div class="empty-icon" style="filter:none">🎉</div><div class="empty-title">すべて確認済み！</div><div class="empty-sub">新しい提案を生成してください</div></div>`;
    btns.style.display='none';return;
  }
  btns.style.display='flex';
  const typeLabel={'opening':'🆕 新オープン','exhibition':'🎨 展示中','seasonal':'🌸 季節限定','event':'⚡ イベント'};
  stack.innerHTML=cur.map((s,i)=>`
    <div class="swipe-card" id="sc-${s.id}" style="z-index:${10-i};transform:scale(${1-i*.03}) translateY(${i*12}px)">
      <div class="swipe-card-bg" style="background:${genreGrad(s.genre)}"></div>
      <div class="swipe-card-content">
        <div class="swipe-label yes" id="sl-yes-${s.id}">行きたい ♡</div>
        <div class="swipe-label no"  id="sl-no-${s.id}">パス ✕</div>
        ${typeLabel[s.suggestedType]?`<div class="swipe-type-badge">${typeLabel[s.suggestedType]}</div>`:''}
        <div class="swipe-genre">${esc(s.genre)}</div>
        <div class="swipe-name">${esc(s.name)}</div>
        <div class="swipe-desc">${esc(s.description)}</div>
        ${s.price?`<div class="swipe-price">💴 ${esc(s.price)}</div>`:''}
        ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="swipe-url">公式サイト →</a>`:''}
      </div>
    </div>`).reverse().join('');
  attachSwipeListeners(pendingSuggestions[swipeIdx].id);
}
function attachSwipeListeners(id){
  const card=document.getElementById('sc-'+id);if(!card)return;
  let startX=0,dragging=false;
  const onMove=(x)=>{
    const dx=x-startX;
    card.style.transform=`translateX(${dx}px) rotate(${dx*.025}deg)`;
    const yes=document.getElementById('sl-yes-'+id);
    const no=document.getElementById('sl-no-'+id);
    if(yes)yes.style.opacity=dx>50?Math.min(1,(dx-50)/70):0;
    if(no)no.style.opacity=dx<-50?Math.min(1,(-dx-50)/70):0;
  };
  const onEnd=(x)=>{
    dragging=false;document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);
    const dx=x-startX;
    if(dx>90)swipeYes();
    else if(dx<-90)swipeNo();
    else{card.style.transition='transform .3s cubic-bezier(.25,.46,.45,.94)';card.style.transform='';setTimeout(()=>card.style.transition='',300);}
  };
  card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;dragging=true;card.style.transition='none';},{passive:true});
  card.addEventListener('touchmove',e=>{if(dragging)onMove(e.touches[0].clientX);},{passive:true});
  card.addEventListener('touchend',e=>{if(dragging)onEnd(e.changedTouches[0].clientX);});
  const mm=e=>{if(dragging)onMove(e.clientX);};
  const mu=e=>{if(dragging)onEnd(e.clientX);};
  card.addEventListener('mousedown',e=>{startX=e.clientX;dragging=true;card.style.transition='none';e.preventDefault();});
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}
async function swipeYes(){
  const s=pendingSuggestions[swipeIdx];if(!s)return;
  const card=document.getElementById('sc-'+s.id);if(card)card.classList.add('fly-yes');
  const newP={id:s.id,name:s.name,url:s.url||'',memo:s.description,genre:s.genre,location:'',price:s.price||'',addedDate:todayStr(),status:'want'};
  places.push(newP);setSt('busy','保存中...');
  try{
    await gasAppend('places',[[newP.id,newP.name,newP.url,newP.memo,newP.genre,newP.location,newP.price,newP.addedDate,newP.status]]);
    await respondSuggestion(s.id,'yes');
    if(s.genre){if(!preferences[s.genre])preferences[s.genre]={liked:0,disliked:0};preferences[s.genre].liked++;await savePreferences();}
    setSt('ok','同期済み');toast(`「${s.name}」を追加しました ♡`);
  }catch(e){log('swipeYes: '+e.message,'err');setSt('err','失敗');}
  setTimeout(()=>{swipeIdx++;renderSwipeDeck();renderFilters();renderWant();renderSuggestHistory();renderPreferences();},390);
}
async function swipeNo(){
  const s=pendingSuggestions[swipeIdx];if(!s)return;
  const card=document.getElementById('sc-'+s.id);if(card)card.classList.add('fly-no');
  try{
    await respondSuggestion(s.id,'no');
    if(s.genre){if(!preferences[s.genre])preferences[s.genre]={liked:0,disliked:0};preferences[s.genre].disliked++;await savePreferences();}
    setSt('ok','同期済み');
  }catch(e){log('swipeNo: '+e.message,'err');setSt('err','失敗');}
  setTimeout(()=>{swipeIdx++;renderSwipeDeck();renderSuggestHistory();renderPreferences();},390);
}
async function respondSuggestion(id,response){
  const idx=suggestions.findIndex(s=>s.id===id);
  if(idx>=0)suggestions[idx].response=response;
  await gasWrite('suggestions',[['id','name','url','genre','description','price','suggestedDate','response','suggestedType'],...suggestions.map(s=>[s.id,s.name,s.url,s.genre,s.description,s.price,s.suggestedDate,s.response,s.suggestedType])]);
}
function renderSuggestHistory(){
  const el=document.getElementById('suggest-history');
  const responded=suggestions.filter(s=>s.response!=='pending').sort((a,b)=>b.suggestedDate.localeCompare(a.suggestedDate)).slice(0,20);
  if(!responded.length){el.innerHTML='<div style="color:var(--t3);font-size:14px;padding:8px 0">まだ履歴なし</div>';return;}
  el.innerHTML=responded.map(s=>{
    const c=genreColor(s.genre);
    return`<div style="display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--sep);gap:12px">
      <div style="width:38px;height:38px;border-radius:12px;background:${genreGrad(s.genre)};flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.08)">
        <span style="font-size:16px">${s.response==='yes'?'♡':'✕'}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:600;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</div>
        <div style="font-size:12px;color:var(--t2);margin-top:3px">${s.suggestedDate} · <span style="color:${c}">${esc(s.genre)}</span></div>
      </div>
      <div style="font-size:18px;color:${s.response==='yes'?'var(--grn)':'var(--t3)'};flex-shrink:0">${s.response==='yes'?'♡':'—'}</div>
    </div>`;
  }).join('');
}

// ── Preferences ──
async function savePreferences(){
  await gasWrite('preferences',[['genre','liked_count','disliked_count'],...Object.entries(preferences).map(([g,v])=>[g,v.liked,v.disliked])]);
}
function renderPreferences(){
  const el=document.getElementById('pref-list');if(!el)return;
  const entries=Object.entries(preferences);
  if(!entries.length){el.innerHTML='<div class="settings-row"><span class="settings-row-label" style="color:var(--t3)">まだデータなし</span></div>';return;}
  el.innerHTML=entries.map(([g,v])=>`
    <div class="pref-item">
      <span class="genre-badge" style="background:${genreColor(g)}22;color:${genreColor(g)}">${esc(g)}</span>
      <div class="pref-genre"></div>
      <div class="pref-counts"><span style="color:var(--grn)">♡ ${v.liked}</span>&nbsp;&nbsp;<span style="color:var(--t3)">✕ ${v.disliked}</span></div>
    </div>`).join('');
}
async function resetPreferences(){
  if(!confirm('学習データをリセットしますか？'))return;
  preferences={};
  await gasWrite('preferences',[['genre','liked_count','disliked_count']]);
  renderPreferences();toast('学習データをリセットしました');
}

// ── Startup ──
(function(){
  hideSetup();
  init();
  if(window.innerWidth>=900){
    document.querySelector('.dntab')?.classList.add('on');
  }
})();
</script>
